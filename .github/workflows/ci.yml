name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -c "import ast, pathlib, sys; errors=[(p,e) for p in pathlib.Path('app').rglob('*.py') for e in [None] if not (lambda p: (ast.parse(p.read_text()), True))(p)]; sys.exit(1) if errors else print('All files OK')"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Import check & startup test
        run: |
          python -c "from app.main import app; print(f'Routes: {len(app.routes)}')"
          mkdir -p data
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl -sf http://127.0.0.1:8000/health
          curl -sf http://127.0.0.1:8000/api/auth/config
          kill %1 2>/dev/null || true

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: pip install -r requirements.txt
      - run: pip-audit || true
